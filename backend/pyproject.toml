[tool.ruff]
# Target Python version
target-version = "py312"
line-length = 88

[tool.ruff.lint]
# E/W: pycodestyle, F: Pyflakes, I: isort (imports), UP: pyupgrade, B: bugbear
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"] # Ignore line-length in linter (handled by formatter)
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"